<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Interaktiv: Visuelle Monats-Zuordnung</title>
    <style>
        :root {
            --primary-color: #4a5568;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #1e293b;
            --border-color: #cbd5e1;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.6rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 6px;
        }

        .instruction {
            text-align: center;
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        /* Wort-Auswahlpool */
        .word-pool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 30px;
            min-height: 60px;
        }

        .word-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 2px solid var(--border-color);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .word-btn:hover:not(.used) {
            border-color: var(--accent-color);
            background-color: #f8fafc;
        }

        .word-btn.selected {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
            transform: scale(1.05);
        }

        .word-btn.used {
            opacity: 0.3;
            cursor: not-allowed;
            background-color: #e2e8f0;
            border-color: #e2e8f0;
        }

        /* Responsives Karten-Raster */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 25px;
        }

        @media (min-width: 480px) {
            .grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 768px) {
            .grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .icon-card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .icon-card:hover {
            border-color: #94a3b8;
            background-color: #fafafa;
        }

        .visual-emoji {
            font-size: 3rem;
            margin-bottom: 8px;
            transition: transform 0.2s;
        }

        .icon-card:hover .visual-emoji {
            transform: scale(1.1);
        }

        .context-hint {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 500;
        }

        /* Platzierte Antwort-Kachel */
        .assigned-word {
            margin-top: 12px;
            background-color: #e0f2fe;
            color: #0369a1;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
            animation: popIn 0.2s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Richtig / Falsch Stile für Karten */
        .icon-card.correct {
            border-color: var(--success-color);
            background-color: #f0fdf4;
        }
        .icon-card.correct .assigned-word {
            background-color: var(--success-color);
            color: white;
        }

        .icon-card.incorrect {
            border-color: var(--error-color);
            background-color: #fef2f2;
        }
        .icon-card.incorrect .assigned-word {
            background-color: var(--error-color);
            color: white;
        }

        /* Action-Buttons */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        @media (min-width: 480px) {
            .action-area {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        @media (min-width: 480px) {
            .btn {
                width: auto;
            }
        }

        .btn-check {
            background-color: var(--success-color);
            color: white;
        }
        .btn-check:hover { background-color: #059669; }

        .btn-reset {
            background-color: #64748b;
            color: white;
        }
        .btn-reset:hover { background-color: #475569; }

        .feedback-msg {
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            min-height: 25px;
            margin-top: 15px;
        }
        .feedback-msg.win { color: var(--success-color); }
        .feedback-msg.lose { color: var(--error-color); }
    </style>
</head>
<body>

<div class="container">
    <h1>Visuelle Monats-Zuordnung</h1>
    <div class="instruction">
        Tippe zuerst auf ein russisches Wort und danach auf die passende Karte mit den Symbolen des Monats.
    </div>

    <!-- Pool der russischen Wörter -->
    <div class="word-pool" id="wordPool"></div>

    <!-- Responsive Karten-Matrix -->
    <div class="grid-container" id="gridContainer"></div>

    <!-- Steuerung -->
    <div class="action-area">
        <button class="btn btn-check" id="checkBtn">Überprüfen</button>
        <button class="btn btn-reset" id="resetBtn">Zurücksetzen</button>
    </div>

    <div class="feedback-msg" id="feedbackMsg"></div>
</div>

<script>
    // Spieldaten mit Emojis als Bildersatz
    const cardsData = [
        { id: "jan", ru: "январские", emoji: "❄️🎄", hint: "Januar-Feiertage" },
        { id: "feb", ru: "февральские", emoji: "🎖️🛡️", hint: "Februar-Feiertage" },
        { id: "mar", ru: "мартовские", emoji: "💐🌷", hint: "März-Feiertage" },
        { id: "mai", ru: "майские", emoji: "🌱☀️", hint: "Mai-Feiertage" },
        { id: "nov", ru: "ноябрьские", emoji: "🍂🍁", hint: "November-Feiertage" }
    ];

    let selectedWord = null;
    let assignments = {}; // Speichert: { cardId: wordText }

    const wordPool = document.getElementById('wordPool');
    const gridContainer = document.getElementById('gridContainer');
    const checkBtn = document.getElementById('checkBtn');
    const resetBtn = document.getElementById('resetBtn');
    const feedbackMsg = document.getElementById('feedbackMsg');

    function initGame() {
        wordPool.innerHTML = '';
        gridContainer.innerHTML = '';
        feedbackMsg.textContent = '';
        feedbackMsg.className = 'feedback-msg';
        selectedWord = null;
        assignments = {};

        // 1. Wörter mischen und Pool aufbauen
        const shuffledWords = [...cardsData].sort(() => Math.random() - 0.5);
        shuffledWords.forEach(item => {
            const btn = document.createElement('button');
            btn.className = 'word-btn';
            btn.textContent = item.ru;
            btn.addEventListener('click', () => handleWordSelect(btn));
            wordPool.appendChild(btn);
        });

        // 2. Visuelle Karten mischen und Raster aufbauen
        const shuffledCards = [...cardsData].sort(() => Math.random() - 0.5);
        shuffledCards.forEach(item => {
            const card = document.createElement('div');
            card.className = 'icon-card';
            card.setAttribute('data-id', item.id);

            card.innerHTML = `
                <div class="visual-emoji">${item.emoji}</div>
                <div class="context-hint">${item.hint}</div>
                <div class="placeholder-zone"></div>
            `;

            card.addEventListener('click', () => handleCardClick(card));
            gridContainer.appendChild(card);
        });
    }

    // Wort im Pool anklicken
    function handleWordSelect(btn) {
        if (btn.classList.contains('used')) return;

        // Vorherige Auswahl entfernen
        const currentSelected = wordPool.querySelector('.word-btn.selected');
        if (currentSelected) currentSelected.classList.remove('selected');

        if (selectedWord === btn) {
            selectedWord = null; // Deselektieren bei zweitem Klick
        } else {
            selectedWord = btn;
            btn.classList.add('selected');
        }
    }

    // Karte anklicken
    function handleCardClick(card) {
        const cardId = card.getAttribute('data-id');
        const placeholder = card.querySelector('.placeholder-zone');

        // Falls auf der Karte bereits ein Wort liegt: Wort zurück in den Pool geben
        if (assignments[cardId]) {
            const oldWordText = assignments[cardId];
            // Finde den Button im Pool und mache ihn wieder aktiv
            const buttons = wordPool.querySelectorAll('.word-btn');
            buttons.forEach(b => {
                if (b.textContent === oldWordText) b.classList.remove('used');
            });
            
            placeholder.innerHTML = '';
            delete assignments[cardId];
            card.className = 'icon-card'; // Status-Klassen entfernen
            return;
        }

        // Falls ein Wort ausgewählt ist, dieses der Karte zuweisen
        if (selectedWord) {
            const wordText = selectedWord.textContent;
            assignments[cardId] = wordText;

            placeholder.innerHTML = `<div class="assigned-word">${wordText}</div>`;
            
            selectedWord.classList.remove('selected');
            selectedWord.classList.add('used');
            selectedWord = null;
        }
    }

    // Auswertung
    checkBtn.addEventListener('click', () => {
        const cards = gridContainer.querySelectorAll('.icon-card');
        let correctCount = 0;
        let totalCount = cardsData.length;
        let allAssigned = Object.keys(assignments).length === totalCount;

        if (!allAssigned) {
            feedbackMsg.textContent = "Bitte ordne zuerst allen Karten ein Wort zu!";
            feedbackMsg.className = "feedback-msg lose";
            return;
        }

        cards.forEach(card => {
            const cardId = card.getAttribute('data-id');
            const assignedWordText = assignments[cardId];
            
            // Finde das korrekte russische Wort aus den Ursprungsdaten heraus
            const correctWordText = cardsData.find(item => item.id === cardId).ru;

            if (assignedWordText === correctWordText) {
                card.className = 'icon-card correct';
                correctCount++;
            } else {
                card.className = 'icon-card incorrect';
            }
        });

        if (correctCount === totalCount) {
            feedbackMsg.textContent = "Отлично! Alle Symbole wurden perfekt zugeordnet! 🌟";
            feedbackMsg.className = "feedback-msg win";
        } else {
            feedbackMsg.textContent = `${correctCount} von ${totalCount} richtig. Klicke auf falsch zugeordnete Karten, um sie zu korrigieren.`;
            feedbackMsg.className = "feedback-msg lose";
        }
    });

    resetBtn.addEventListener('click', initGame);

    // Erster Start
    initGame();
</script>

</body>
</html>

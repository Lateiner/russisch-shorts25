<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Interaktiv: Richtig oder Falsch?</title>
    <style>
        :root {
            --primary-color: #2d3748;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #1a202c;
            --border-color: #e2e8f0;
            --success-color: #38a169;
            --success-bg: #f0fff4;
            --error-color: #e53e3e;
            --error-bg: #fff5f5;
            --accent-color: #3182ce;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #718096;
            text-align: center;
            margin-bottom: 25px;
        }

        /* Fortschrittsanzeige */
        .progress-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #718096;
            font-weight: bold;
        }

        .progress-bar {
            flex-grow: 1;
            height: 6px;
            background-color: var(--border-color);
            border-radius: 3px;
            margin-right: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* Quiz-Karte */
        .quiz-card {
            background: #f8fafc;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* Antwort-Buttons */
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .quiz-btn {
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            cursor: pointer;
            background-color: white;
            transition: all 0.2s ease;
            outline: none;
        }

        .btn-true { color: var(--success-color); border-color: #c6f6d5; }
        .btn-true:hover:not(.disabled) { background-color: var(--success-bg); }
        .btn-true.selected-correct { background-color: var(--success-color); color: white; border-color: var(--success-color); }

        .btn-false { color: var(--error-color); border-color: #fed7d7; }
        .btn-false:hover:not(.disabled) { background-color: var(--error-bg); }
        .btn-false.selected-correct { background-color: var(--error-color); color: white; border-color: var(--error-color); }
        
        /* Stile für falsche Auswahl */
        .quiz-btn.selected-incorrect {
            background-color: #718096;
            color: white;
            border-color: #718096;
        }

        .quiz-btn.disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* Feedback-Box */
        .feedback-box {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        .feedback-box.correct { background-color: var(--success-bg); border-left: 5px solid var(--success-color); color: #22543d; }
        .feedback-box.incorrect { background-color: var(--error-bg); border-left: 5px solid var(--error-color); color: #742a2a; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navigation */
        .next-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s;
        }

        .next-btn:hover {
            background-color: #1a202c;
        }

        /* Ergebnis-Ansicht */
        .results-screen {
            text-align: center;
            display: none;
            padding: 10px 0;
        }

        .score-display {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h1>Richtig oder Falsch?</h1>
        <div class="subtitle">Prüfe dein Wissen über die russischen Alltagsausdrücke</div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span id="progressText">Frage 1 / 4</span>
        </div>

        <div class="quiz-card" id="statementText">
            <!-- Wird per JS befüllt -->
        </div>

        <div class="btn-container">
            <button class="quiz-btn btn-true" id="trueBtn">Richtig</button>
            <button class="quiz-btn btn-false" id="falseBtn">Falsch</button>
        </div>

        <div class="feedback-box" id="feedbackBox">
            <!-- Wird per JS befüllt -->
        </div>

        <button class="next-btn" id="nextBtn">Nächste Frage</button>
    </div>

    <!-- Ergebnis-Bildschirm -->
    <div class="results-screen" id="resultsScreen">
        <h1>Quiz abgeschlossen!</h1>
        <div class="score-display" id="scoreDisplay">0 / 0</div>
        <p id="resultComment" style="margin-bottom: 25px; color: #4a5568;"></p>
        <button class="next-btn" id="restartBtn" style="display: block;">Quiz wiederholen</button>
    </div>
</div>

<script>
    // Die Fragen basieren vollständig auf den Informationen der Anleitung
    const quizData = [
        {
            statement: "Wenn jemand fragt: „Что будешь делать на ноябрьские?“, möchte er wissen, was du den gesamten November über tust.",
            isCorrect: false,
            explanation: "<b>Falsch!</b> Die Endung bezieht sich im Alltag sprachlich verkürzt nur auf die freien Feiertage oder das verlängerte Wochenende im November."
        },
        {
            statement: "Das russische Wort „майские“ leitet sich als Adjektiv im Plural direkt vom Monatsnamen Mai ab.",
            isCorrect: true,
            explanation: "<b>Richtig!</b> Es ist ein substantiviertes Adjektiv im Plural und bedeutet sinngemäß „die Mai-igen [Tage]“."
        },
        {
            statement: "Ausdrücke wie „январские“ oder „мартовские“ werden in der russischen Sprache vor allem für Monate genutzt, in denen es große gesetzliche Feiertage gibt.",
            isCorrect: true,
            explanation: "<b>Richtig!</b> Im Januar sind es die Neujahrsferien, im März der Frauentag. Für Monate ohne große Feiertage nutzt man diese Formen im Alltag kaum."
        },
        {
            statement: "Der Satz „Какие планы на январские?“ bedeutet übersetzt: „Welche Pläne hast du für das neue Jahr?“",
            isCorrect: false,
            explanation: "<b>Falsch!</b> Es bedeutet konkret: „Was sind deine Pläne für die freien Januar-Tage (Neujahrs- und Weihnachtsferien)?“"
        }
    ];

    let currentIndex = 0;
    let score = 0;

    const statementText = document.getElementById('statementText');
    const trueBtn = document.getElementById('trueBtn');
    const falseBtn = document.getElementById('falseBtn');
    const feedbackBox = document.getElementById('feedbackBox');
    const nextBtn = document.getElementById('nextBtn');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    
    const quizScreen = document.getElementById('quiz-screen');
    const resultsScreen = document.getElementById('resultsScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const resultComment = document.getElementById('resultComment');
    const restartBtn = document.getElementById('restartBtn');

    function loadQuestion() {
        feedbackBox.style.display = 'none';
        nextBtn.style.display = 'none';
        
        // Buttons zurücksetzen
        [trueBtn, falseBtn].forEach(btn => {
            btn.className = btn.id === 'trueBtn' ? 'quiz-btn btn-true' : 'quiz-btn btn-false';
        });

        const currentData = quizData[currentIndex];
        statementText.innerHTML = currentData.statement;

        // Fortschritt berechnen
        const progressPercent = ((currentIndex) / quizData.length) * 100;
        progressFill.style.width = `${progressPercent}%`;
        progressText.textContent = `Frage ${currentIndex + 1} / ${quizData.length}`;
    }

    function handleAnswer(selectedTrue) {
        // Wenn bereits geantwortet wurde, Klick ignorieren
        if (nextBtn.style.display === 'block') return;

        const currentData = quizData[currentIndex];
        const isUserCorrect = (selectedTrue === currentData.isCorrect);

        if (isUserCorrect) {
            score++;
            feedbackBox.className = "feedback-box correct";
            feedbackBox.innerHTML = `<strong>Richtig!</strong><br>` + currentData.explanation;
            
            // Den geklickten Button grün einfärben
            if (selectedTrue) trueBtn.classList.add('selected-correct');
            else falseBtn.classList.add('selected-correct');
        } else {
            feedbackBox.className = "feedback-box incorrect";
            feedbackBox.innerHTML = `<strong>Leider falsch...</strong><br>` + currentData.explanation;
            
            // Den geklickten Button grau/neutral färben, den eigentlich richtigen Button farbig hervorheben
            if (selectedTrue) {
                trueBtn.classList.add('selected-incorrect');
                falseBtn.classList.add('selected-correct');
            } else {
                falseBtn.classList.add('selected-incorrect');
                trueBtn.classList.add('selected-correct');
            }
        }

        // Andere Auswahl sperren
        trueBtn.classList.add('disabled');
        falseBtn.classList.add('disabled');

        feedbackBox.style.display = 'block';
        nextBtn.style.display = 'block';
        
        if(currentIndex === quizData.length - 1) {
            nextBtn.textContent = "Zur Auswertung";
        } else {
            nextBtn.textContent = "Nächste Frage";
        }
    }

    trueBtn.addEventListener('click', () => handleAnswer(true));
    falseBtn.addEventListener('click', () => handleAnswer(false));

    nextBtn.addEventListener('click', () => {
        if (currentIndex < quizData.length - 1) {
            currentIndex++;
            loadQuestion();
        } else {
            showResults();
        }
    });

    function showResults() {
        quizScreen.style.display = 'none';
        resultsScreen.style.display = 'block';
        scoreDisplay.textContent = `${score} / ${quizData.length}`;

        if (score === quizData.length) {
            resultComment.textContent = "Великолепно! Du hast das Prinzip der russischen Monats-Feiertage fehlerfrei verstanden! 🎉";
        } else if (score >= quizData.length / 2) {
            resultComment.textContent = "Gute Leistung! Die meisten Nuancen hast du bereits verstanden. 🚀";
        } else {
            resultComment.textContent = "Lies dir die Anleitung am besten noch einmal durch und versuche es erneut. Übung macht den Meister!";
        }
    }

    restartBtn.addEventListener('click', () => {
        currentIndex = 0;
        score = 0;
        resultsScreen.style.display = 'none';
        quizScreen.style.display = 'block';
        nextBtn.textContent = "Nächste Frage";
        loadQuestion();
    });

    // Erster Start
    loadQuestion();
</script>

</body>
</html>
